<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Спортивный клуб «Олимп» | Запись</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/2921/2921222.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Шапка сайта -->
    <header class="bg-primary text-white py-3">
        <div class="container d-flex justify-content-between align-items-center">
            <a href="index.html" class="d-flex align-items-center text-decoration-none text-white">
                <img src="https://cdn-icons-png.flaticon.com/512/2921/2921222.png" alt="Логотип" width="40" class="me-2">
                <span class="fs-4 fw-bold">дом спорта</span>
            </a>
            <nav>
                <ul class="nav">
                    <li class="nav-item"><a href="index.html" class="nav-link text-white">Главная</a></li>
                    <li class="nav-item"><a href="list.html" class="nav-link text-white">Секции</a></li>
                    <li class="nav-item"><a href="form.html" class="nav-link text-white fw-bold">Записаться</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Основной контент -->
    <main class="container my-5">
        <h2 class="text-center mb-4">📝 Форма записи на тренировку</h2>
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <form class="p-4 bg-light rounded shadow">
                    <div class="mb-3">
                        <label for="fullName" class="form-label">ФИО</label>
                        <input type="text" class="form-control" id="fullName" required>
                    </div>
                    <div class="mb-3">
                        <label for="phone" class="form-label">Телефон</label>
                        <input type="tel" class="form-control" id="phone" placeholder="+7 (999) 000-00-00" required>
                    </div>
                    <div class="mb-3">
                        <label for="program" class="form-label">Выберите направление</label>
                        <select class="form-select" id="program" required>
                            <option value="" disabled selected>Выберите...</option>
                            <option value="strength">Силовые тренировки</option>
                            <option value="cardio">Кардио-зал</option>
                            <option value="yoga">Йога и растяжка</option>
							<option value="football">футболу</option>
							  <option value="basketball">Баскетбол</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="comments" class="form-label">Комментарий (необязательно)</label>
                        <textarea class="form-control" id="comments" rows="3"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Отправить заявку</button>
                </form>
            </div>
        </div>
    </main>

    <!-- Подвал сайта -->
    <footer class="bg-dark text-white text-center py-3 mt-5">
        <p class="mb-0">&copy; 2026 Спортивный клуб «Олимп». Все права защищены. (zamika)</p>
    </footer>
</body>
</html>
